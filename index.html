<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>6m Bar Cutting Optimizer</title>

<style>
body{
    font-family: Arial;
    margin:40px;
}

table{
    border-collapse: collapse;
    margin-bottom:20px;
}

td,th{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

button{
    padding:8px 14px;
    margin:5px;
}

#results{
    margin-top:30px;
    white-space:pre-line;
    background:#f5f5f5;
    padding:15px;
}
</style>

</head>

<body>

<h2>6m Bar Cutting Optimizer</h2>

<p>Δώσε μήκη και πλήθος κομματιών</p>

<table id="inputTable">
<tr>
<th>Μήκος (m)</th>
<th>Πλήθος</th>
<th></th>
</tr>

<tr>
<td><input type="number" step="0.01"></td>
<td><input type="number"></td>
<td><button onclick="removeRow(this)">X</button></td>
</tr>

</table>

<button onclick="addRow()">+ Προσθήκη Μήκους</button>
<button onclick="calculate()">Υπολογισμός</button>

<div id="results"></div>

<script>

const STOCK = 6;

function addRow(){

    let table = document.getElementById("inputTable");

    let row = table.insertRow();

    row.innerHTML =
    `
    <td><input type="number" step="0.01"></td>
    <td><input type="number"></td>
    <td><button onclick="removeRow(this)">X</button></td>
    `;
}

function removeRow(btn){
    btn.parentNode.parentNode.remove();
}

function optimizeCut(lengths, quantities){

    let pieces = [];

    for(let i=0;i<lengths.length;i++){

        for(let j=0;j<quantities[i];j++){
            pieces.push(lengths[i]);
        }

    }

    pieces.sort((a,b)=>b-a);

    let bars = [];

    for(let piece of pieces){

        let placed = false;

        for(let bar of bars){

            let sum = bar.reduce((a,b)=>a+b,0);

            if(sum + piece <= STOCK){
                bar.push(piece);
                placed = true;
                break;
            }

        }

        if(!placed){
            bars.push([piece]);
        }

    }

    return bars;
}

function calculate(){

    let table = document.getElementById("inputTable");

    let lengths = [];
    let quantities = [];

    for(let i=1;i<table.rows.length;i++){

        let length = parseFloat(table.rows[i].cells[0].children[0].value);
        let qty = parseInt(table.rows[i].cells[1].children[0].value);

        if(!isNaN(length) && !isNaN(qty)){
            lengths.push(length);
            quantities.push(qty);
        }

    }

    let bars = optimizeCut(lengths, quantities);

    let totalWaste = 0;

    let output = "CUTTING PLAN\n\n";

    bars.forEach((bar,index)=>{

        let used = bar.reduce((a,b)=>a+b,0);
        let waste = STOCK - used;

        totalWaste += waste;

        output +=
        "Bar " + (index+1) +
        " -> " + bar.join(", ") +
        " | used=" + used.toFixed(2) +
        " | waste=" + waste.toFixed(2) +
        "\n";

    });

    let totalRequired = 0;

    for(let i=0;i<lengths.length;i++){
        totalRequired += lengths[i]*quantities[i];
    }

    let lowerBound = Math.ceil(totalRequired / STOCK);

    output += "\nTotal bars used: " + bars.length;
    output += "\nTotal waste: " + totalWaste.toFixed(2);
    output += "\nTotal material required: " + totalRequired.toFixed(2);
    output += "\nTheoretical minimum bars: " + lowerBound;

    document.getElementById("results").innerText = output;
}

</script>

</body>
</html>
