<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bar Cutting Optimizer</title>

<style>

/* ---------- GLOBAL ---------- */

*{
box-sizing:border-box;
}

body{
margin:0;
font-family: system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f4f6fb;
color:#222;
}

/* ---------- LAYOUT ---------- */

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
margin-bottom:20px;
}

/* ---------- HEADER ---------- */

h1{
margin-top:0;
font-size:1.6rem;
}

label{
display:block;
font-weight:600;
margin-bottom:6px;
}

/* ---------- INPUTS ---------- */

input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #d8dbe6;
font-size:16px;
}

input:focus{
outline:none;
border-color:#4a6cff;
box-shadow:0 0 0 3px rgba(74,108,255,0.15);
}

/* ---------- TABLE ---------- */

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
text-align:left;
font-size:0.85rem;
color:#777;
padding-bottom:8px;
}

td{
padding:6px 0;
}

/* ---------- BUTTONS ---------- */

button{
border:none;
border-radius:10px;
padding:10px 14px;
font-size:15px;
font-weight:600;
cursor:pointer;
}

.btn-primary{
background:#4a6cff;
color:white;
width:100%;
margin-top:12px;
}

.btn-primary:hover{
background:#3b5af0;
}

.btn-add{
background:#e8ecff;
color:#3247c5;
width:100%;
margin-top:10px;
}

.btn-remove{
background:#ffeded;
color:#cc3a3a;
padding:8px 10px;
}

/* ---------- RESULTS ---------- */

#results{
background:#0f172a;
color:#e2e8f0;
padding:16px;
border-radius:12px;
font-family:monospace;
font-size:14px;
white-space:pre-line;
margin-top:10px;
overflow:auto;
}

/* ---------- MOBILE OPTIMIZATION ---------- */

@media (max-width:600px){

.container{
padding:14px;
}

h1{
font-size:1.4rem;
}

button{
font-size:16px;
padding:12px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Bar Cutting Optimizer</h1>

<label>Μήκος Βέργας (m)</label>
<input type="number" id="stockLength" value="6" step="0.01">

</div>

<div class="card">

<label>Μήκη κοπής</label>

<table id="inputTable">

<tr>
<th>Μήκος</th>
<th>Πλήθος</th>
<th></th>
</tr>

<tr>
<td><input type="number" step="0.01"></td>
<td><input type="number"></td>
<td><button class="btn-remove" onclick="removeRow(this)">✕</button></td>
</tr>

</table>

<button class="btn-add" onclick="addRow()">+ Προσθήκη Μήκους</button>

<button class="btn-primary" onclick="calculate()">Υπολογισμός</button>

</div>

<div class="card">

<label>Αποτελέσματα</label>
<div id="results"></div>

</div>

</div>

<script>

function addRow(){

let table=document.getElementById("inputTable");

let row=table.insertRow();

row.innerHTML=
`
<td><input type="number" step="0.01"></td>
<td><input type="number"></td>
<td><button class="btn-remove" onclick="removeRow(this)">✕</button></td>
`;

}

function removeRow(btn){

btn.parentNode.parentNode.remove();

}

function optimizeCut(lengths,quantities,STOCK){

let pieces=[];

for(let i=0;i<lengths.length;i++){

for(let j=0;j<quantities[i];j++){

pieces.push(lengths[i]);

}

}

pieces.sort((a,b)=>b-a);

let bars=[];

for(let piece of pieces){

let placed=false;

for(let bar of bars){

let sum=bar.reduce((a,b)=>a+b,0);

if(sum+piece<=STOCK){

bar.push(piece);

placed=true;

break;

}

}

if(!placed){

bars.push([piece]);

}

}

return bars;

}

function calculate(){

let STOCK=parseFloat(document.getElementById("stockLength").value);

let table=document.getElementById("inputTable");

let lengths=[];
let quantities=[];

for(let i=1;i<table.rows.length;i++){

let length=parseFloat(table.rows[i].cells[0].children[0].value);
let qty=parseInt(table.rows[i].cells[1].children[0].value);

if(!isNaN(length)&&!isNaN(qty)){

lengths.push(length);
quantities.push(qty);

}

}

let bars=optimizeCut(lengths,quantities,STOCK);

let totalWaste=0;

let output="CUTTING PLAN\n\n";

bars.forEach((bar,index)=>{

let used=bar.reduce((a,b)=>a+b,0);
let waste=STOCK-used;

totalWaste+=waste;

output+=
"Bar "+(index+1)+
" -> "+bar.join(", ")+
" | used="+used.toFixed(2)+
" | waste="+waste.toFixed(2)+"\n";

});

let totalRequired=0;

for(let i=0;i<lengths.length;i++){

totalRequired+=lengths[i]*quantities[i];

}

let lowerBound=Math.ceil(totalRequired/STOCK);

output+="\nTotal bars used: "+bars.length;
output+="\nTotal waste: "+totalWaste.toFixed(2);
output+="\nTotal material required: "+totalRequired.toFixed(2);
output+="\nTheoretical minimum bars: "+lowerBound;

document.getElementById("results").innerText=output;

}

</script>

</body>
</html>
