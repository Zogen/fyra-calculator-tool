<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Fyra Calculator Tool</title>

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" href="content/favicon.ico" />
</head>

<body>
    <div class="container">
        <header>
            <h1>Fyra Calculator</h1>
        </header>

        <section class="card">
            <label>Stock Bar Length (m)</label>
            <input type="number" id="stockLength" value="6" step="0.01" />
        </section>

        <section class="card">
            <table id="inputTable">
                <thead>
                    <tr>
                        <th>Length</th>
                        <th>Quantity</th>
                        <th></th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td><input type="number" step="0.01" /></td>
                        <td><input type="number" /></td>
                        <td><button onclick="removeRow(this)">✕</button></td>
                    </tr>
                </tbody>
            </table>

            <button class="btn-add" onclick="addRow()">Add Length</button>
            <button class="btn-primary" onclick="calculate()">Calculate</button>
        </section>

        <section class="card">
            <h3>Cutting Plan</h3>

            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>Bar</th>
                        <th>Pieces</th>
                        <th>Used Length</th>
                        <th>Waste</th>
                    </tr>
                </thead>

                <tbody></tbody>
            </table>

            <div id="summary"></div>
        </section>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
